name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build phase: render needs server-only env vars to be set
          # so the page can run. Real values are injected by the
          # operator at runtime; build-time placeholders just need to
          # be non-empty strings so the page module loads.
          INTENTGATE_GATEWAY_URL: "http://localhost:8080"
          INTENTGATE_ADMIN_TOKEN: "ci-build-placeholder-not-real"
